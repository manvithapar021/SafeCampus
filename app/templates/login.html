{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow border-0 mt-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-shield-alt text-danger fa-3x"></i>
                    <h3 class="fw-bold mt-2">Welcome Back</h3>
                    <p class="text-muted">Login to SafeCampus</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-envelope text-muted"></i>
                            </span>
                            <input type="email" name="email" class="form-control" placeholder="Enter your email"
                                required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-lock text-muted"></i>
                            </span>
                            <input type="password" name="password" class="form-control"
                                placeholder="Enter your password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-danger w-100 py-2 fw-semibold">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                    <div class="text-center mt-3">
                        <a href="{{ url_for('main.forgot_password') }}" class="text-muted small">
                            <i class="fas fa-key"></i> Forgot your password?
                        </a>
                    </div>
                </form>
                <hr class="my-4">
                <p class="text-center text-muted mb-0">
                    Don't have an account?
                    <a href="{{ url_for('main.register') }}" class="text-danger fw-semibold">
                        Register here
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
