{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow border-0 mt-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-key text-danger fa-3x"></i>
                    <h3 class="fw-bold mt-2">Forgot Password?</h3>
                    <p class="text-muted">Enter your email and we'll send a reset link</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email Address</label>
                        <input type="email" name="email" class="form-control" placeholder="Enter your registered email"
                            required>
                    </div>
                    <button type="submit" class="btn btn-danger w-100 py-2">
                        <i class="fas fa-paper-plane"></i> Send Reset Link
                    </button>
                </form>
                <hr>
                <p class="text-center text-muted mb-0">
                    Remember your password?
                    <a href="{{ url_for('main.login') }}" class="text-danger">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
